<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAROUQBOOK - Pintasan Belajar Mahasiswa</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ff6b6b 100%);
            --text-color: #ffffff;
            --bg-color: #0f172a; /* Navy gelap yang elegan */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(120, 50, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 50, 120, 0.1) 0%, transparent 40%);
            font-family: 'Poppins', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            overflow: hidden; /* Mencegah scrollbar di landing page */
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            z-index: 10; /* Di atas background gradients */
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -3px;
            line-height: 1;
        }

        .brand-name {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            /* Efek sedikit bersinar */
            filter: drop-shadow(0 0 10px rgba(118, 75, 162, 0.5));
        }

        p {
            font-size: 1.4rem;
            color: #cbd5e1;
            margin-bottom: 3rem;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: 600;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(118, 75, 162, 0.4);
        }

        button:hover::after {
            opacity: 1;
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 5px 10px rgba(118, 75, 162, 0.4);
        }
        
        /* Font pendukung dari Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
    </style>
</head>
<body>

    <div class="container">
        <h1>FAROUQ <span class="brand-name">BOOK</span></h1>
        <p>Ubah video YouTube berjam-jam menjadi ringkasan cerdas & terstruktur dalam hitungan detik.</p>
        <button onclick="startApp()">GET STARTED</button>
    </div>

    <script>
        function startApp() {
            // Ini akan diarahkan ke halaman input/dashboard
            alert('Membuka Dashboard FAROUQBOOK...');
            // window.open('dashboard.html', '_blank'); 
        }
    </script>

</body>
</html>
